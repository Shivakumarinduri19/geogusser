<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>JNTUH Geo-Hunter | Play</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #map { height: 50vh; width: 100%; border-top: 2px solid #f59e0b; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .user-dot { 
            background: #06b6d4; 
            border: 2px solid white; 
            border-radius: 50%; 
            box-shadow: 0 0 15px #06b6d4; 
            transition: all 0.3s ease;
        }
        /* Fix for Leaflet tile flickering on some mobile browsers */
        .leaflet-tile-container { will-change: transform; }
    </style>
</head>
<body class="bg-slate-950 text-white overflow-hidden h-screen">

    <div id="auth-screen" class="fixed inset-0 z-[9999] bg-slate-950 flex items-center justify-center p-6">
        <div class="glass p-8 rounded-[2rem] w-full max-w-sm border border-amber-500/20 text-center">
            <h1 class="text-3xl font-black text-amber-500 mb-6 italic">GEOHUNTER</h1>
            <input id="email" type="email" placeholder="Email" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl mb-4 outline-none focus:border-amber-500">
            <input id="password" type="password" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl mb-6 outline-none focus:border-amber-500">
            <button id="auth-btn" class="w-full bg-amber-500 text-slate-950 font-black py-4 rounded-xl uppercase active:scale-95 transition-all">Start Hunt</button>
        </div>
    </div>

    <div id="game-ui" class="hidden flex flex-col h-screen">
        <div class="h-[50vh] relative bg-zinc-900">
            <img id="clue-img" src="https://via.placeholder.com/600x400?text=Searching..." class="w-full h-full object-cover opacity-60">
            <div class="absolute bottom-0 w-full glass p-4 rounded-t-3xl border-t border-amber-500/50">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] bg-amber-500 text-slate-900 px-2 py-0.5 rounded font-black uppercase">Spot <span id="loc-num">1</span>/15</span>
                    <span id="score" class="font-mono font-bold text-amber-500">0000 PTS</span>
                </div>
                <p id="clue-text" class="text-sm font-medium leading-tight text-slate-200">Initializing your mission...</p>
            </div>
        </div>

        <div class="relative flex-grow">
            <div id="map"></div>
            <div class="absolute bottom-6 left-4 right-4 z-[1000] flex flex-col gap-3">
                <div id="gps-acc" class="glass px-3 py-1 rounded-full text-[9px] font-mono text-cyan-400 self-center">GPS: WAITING FOR SIGNAL...</div>
                <button id="mark-btn" class="w-full bg-amber-500 text-slate-900 font-black py-4 rounded-2xl shadow-2xl active:scale-95 transition-all uppercase">Mark Ground Position</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
           
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const DATA = [
            { id: 1, lat: 17.493320, lon: 78.391450, hint: "The Grand Entrance: Stand between the two massive orange pillars of the Main Gate.", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/JNTU_Hyderabad_Main_Gate.jpg/640px-JNTU_Hyderabad_Main_Gate.jpg" },
            { id: 2, lat: 17.494150, lon: 78.392340, hint: "Knowledge Hub: Mark the ground at the bottom of the Central Library entrance steps.", img: "https://via.placeholder.com/600x400?text=Central+Library" },
            { id: 3, lat: 17.495080, lon: 78.393220, hint: "IST Building: The home of Geoinformatics. Mark the entrance path.", img: "https://via.placeholder.com/600x400?text=IST+Building" },
            { id: 4, lat: 17.491820, lon: 78.392150, hint: "JNTUH Auditorium: Stand in the center of the open space in front of the main porch.", img: "https://via.placeholder.com/600x400?text=Auditorium" },
            { id: 5, lat: 17.493850, lon: 78.390550, hint: "Student Hub: The Canteen Courtyard near the circular seating area.", img: "https://via.placeholder.com/600x400?text=Canteen" },
            { id: 6, lat: 17.493100, lon: 78.393500, hint: "Bank Zone: Mark the spot near the SBI Bank / Post Office corner.", img: "https://via.placeholder.com/600x400?text=SBI+Bank" },
            { id: 7, lat: 17.495800, lon: 78.391800, hint: "Sports Ground: Stand near the Cricket Ground pavilion entrance.", img: "https://via.placeholder.com/600x400?text=Ground" },
            { id: 8, lat: 17.492500, lon: 78.390800, hint: "Admin Block: Mark the ground directly facing the Registrar's office entrance.", img: "https://via.placeholder.com/600x400?text=Admin+Block" },
            { id: 9, lat: 17.494500, lon: 78.394500, hint: "Health Centre: Find the quiet path leading to the University Health Centre.", img: "https://via.placeholder.com/600x400?text=Health+Centre" },
            { id: 10, lat: 17.496500, lon: 78.393000, hint: "Hostel Zone: Stand at the crossroad leading to the Boys Hostels.", img: "https://via.placeholder.com/600x400?text=Hostels" },
            { id: 11, lat: 17.492000, lon: 78.394000, hint: "Mechanical Dept: Stand near the old workshop engine display.", img: "https://via.placeholder.com/600x400?text=Mechanical" },
            { id: 12, lat: 17.493500, lon: 78.392500, hint: "Placement Cell: Mark the ground near the UIIC building entrance.", img: "https://via.placeholder.com/600x400?text=Placement+Cell" },
            { id: 13, lat: 17.495200, lon: 78.391000, hint: "Civil Engineering: Mark the entrance of the CE department block.", img: "https://via.placeholder.com/600x400?text=Civil+Dept" },
            { id: 14, lat: 17.494000, lon: 78.395500, hint: "Seminar Hall: Locate the entrance to the SIT Seminar building.", img: "https://via.placeholder.com/600x400?text=SIT" },
            { id: 15, lat: 17.493300, lon: 78.391400, hint: "The Final Stand: Return to the flag post near the main administrative building.", img: "https://via.placeholder.com/600x400?text=Flag+Post" }
        ];

        let index = 0, score = 0, map, userMarker, firstFix = false;

        document.getElementById('auth-btn').onclick = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return alert("Email and Password required!");
            try { await signInWithEmailAndPassword(auth, e, p); } 
            catch { await createUserWithEmailAndPassword(auth, e, p); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('game-ui').classList.remove('hidden');
                const snap = await get(ref(db, `leaderboard/${user.uid}`));
                if (snap.exists()) { index = snap.val().mapped || 0; score = snap.val().score || 0; }
                initMap();
                loadTarget();
            }
        });

        function initMap() {
            // Default view JNTUH Main Gate
            map = L.map('map', { zoomControl: false, tap: false }).setView([17.4933, 78.3914], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            // Give the browser time to render before asking for location
            setTimeout(() => {
                map.locate({ 
                    watch: true, 
                    enableHighAccuracy: true,
                    maximumAge: 1000 
                });
            }, 1000);

            map.on('locationfound', (e) => {
                const acc = e.accuracy.toFixed(1);
                const accEl = document.getElementById('gps-acc');
                accEl.innerText = `GPS ACCURACY: ±${acc}M`;
                accEl.style.color = acc < 20 ? "#4ade80" : "#22d3ee";

                if (!userMarker) {
                    userMarker = L.circleMarker(e.latlng, { radius: 10, weight: 3, color: '#fff', fillColor: '#06b6d4', fillOpacity: 1 }).addTo(map);
                } else {
                    userMarker.setLatLng(e.latlng);
                }
                
                if(!firstFix) {
                    map.flyTo(e.latlng, 18);
                    firstFix = true;
                }
            });

            map.on('locationerror', (e) => {
                let errorMsg = "GPS ERROR: ";
                if(e.code === 1) errorMsg += "PERMISSION DENIED";
                else if(e.code === 2) errorMsg += "UNAVAILABLE";
                else if(e.code === 3) errorMsg += "TIMEOUT";
                else errorMsg += "OFFLINE";
                
                document.getElementById('gps-acc').innerText = errorMsg;
                document.getElementById('gps-acc').style.color = "#f87171";
            });
        }

        function loadTarget() {
            if (index >= DATA.length) {
                document.getElementById('clue-text').innerText = "CONGRATULATIONS! YOU COMPLETED THE JNTUH HUNT.";
                document.getElementById('mark-btn').innerText = "RESTART GAME";
                document.getElementById('mark-btn').onclick = () => location.reload();
                return;
            }
            const t = DATA[index];
            document.getElementById('clue-img').src = t.img;
            document.getElementById('clue-text').innerText = t.hint;
            document.getElementById('loc-num').innerText = index + 1;
            document.getElementById('score').innerText = score.toString().padStart(4, '0') + " PTS";
        }

        document.getElementById('mark-btn').onclick = async () => {
            if (index >= DATA.length) return;

            const center = map.getCenter(); // Uses where the user has the map centered
            const target = DATA[index];
            const dist = getDistance(center.lat, center.lng, target.lat, target.lon);
            
            let pts = Math.floor(5000 * Math.exp(-dist / 60)); 
            if (pts < 50) pts = 50; 

            score += pts;
            index++;

            await update(ref(db, `leaderboard/${auth.currentUser.uid}`), {
                email: auth.currentUser.email,
                score: score,
                mapped: index,
                last_capture: new Date().toISOString()
            });

            alert(`Captured! Distance Error: ${Math.round(dist)}m. Points: ${pts}`);
            loadTarget();
        };

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
